<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinto Box Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #FDFBF7; color: #4A3728; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(215, 193, 167, 0.3); border-radius: 24px; }
        .btn-tab { padding: 6px 18px; border-radius: 99px; font-size: 0.8rem; transition: all 0.3s ease; }
        .btn-tab.active { background-color: #8D6E63; color: white; box-shadow: 0 4px 12px rgba(141, 110, 99, 0.2); }
        .btn-tab:not(.active) { color: #8D6E63; border: 1px solid #8D6E63; }
        .btn-primary { background-color: #8D6E63; color: #FFF; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #6D4C41; transform: translateY(-2px); }
        input[type="date"] { border: 1px solid #D7C1A7; border-radius: 8px; padding: 4px 8px; font-size: 0.85rem; color: #5D4037; outline: none; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        
        /* สไตล์สำหรับสถานะมุมขวาบน */
        .system-status-mini {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 100;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            .system-status-mini { position: absolute; top: 0.5rem; right: 0.5rem; }
        }
    </style>
</head>
<body class="p-4 md:p-8 relative">
    <!-- สถานะระบบขนาดจิ๋ว มุมขวาบนสุด (Fixed) -->
    <div class="system-status-mini flex items-center gap-2 px-2 py-1 bg-white/90 rounded-full border border-[#F5EDE3] shadow-sm">
        <span id="status-indicator" class="status-dot bg-gray-300"></span>
        <span id="status-text" class="text-[9px] font-medium text-[#A1887F]">รอโหลด...</span>
    </div>

    <div class="max-w-7xl mx-auto">
        <!-- Header Section -->
        <header class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-medium text-[#5D4037]">Dashboard ร้านกล่องปิ่นโต</h1>
                <p class="text-[#8D6E63] text-sm mt-1">อัปเดตข้อมูลล่าสุด: <span id="data-count">เตรียมข้อมูล...</span></p>
            </div>
            
            <div class="flex flex-wrap items-center gap-4 bg-white p-4 rounded-3xl shadow-sm border border-[#F5EDE3]">
                <div class="flex flex-col">
                    <label class="text-[10px] text-[#A1887F] uppercase font-bold mb-1">ตั้งแต่วันที่</label>
                    <input type="date" id="start-date" onchange="renderDashboard()">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] text-[#A1887F] uppercase font-bold mb-1">ถึงวันที่</label>
                    <input type="date" id="end-date" onchange="renderDashboard()">
                </div>
                <div class="h-8 w-[1px] bg-[#F5EDE3] mx-2 hidden md:block"></div>
                <div class="flex items-center gap-2">
                    <button onclick="changeView('daily')" id="tab-daily" class="btn-tab active">รายวัน</button>
                    <button onclick="changeView('monthly')" id="tab-monthly" class="btn-tab">รายเดือน</button>
                </div>
                <button onclick="fetchData()" class="p-2 btn-primary rounded-full shadow-md ml-2" title="รีเฟรชข้อมูล">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 16H3v5"></path></svg>
                </button>
            </div>
        </header>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-6 border-b-4 border-[#8D6E63] relative overflow-hidden">
                <div class="absolute -right-4 -bottom-4 opacity-10 text-[#8D6E63]">
                    <svg width="100" height="100" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.82v-1.91c-1.35-.22-2.61-.75-3.66-1.55l1.64-1.64c.73.54 1.58.9 2.52 1.03v-2.88c-1.89-.44-3.32-1.31-3.32-2.99 0-1.47 1.09-2.5 2.82-2.85V5h2.82v1.89c1.03.17 1.97.52 2.77 1l-1.58 1.58c-.5-.28-1.07-.48-1.69-.56v2.79c1.86.49 3.42 1.25 3.42 3.1 0 1.62-1.31 2.74-3.42 3.29zM10.5 11.23c-.56.14-.92.4-.92.76 0 .39.46.72 1.12.89v-1.65zm2.82 3.66c.64-.17 1.08-.45 1.08-.86 0-.44-.55-.78-1.42-.99v1.85z"/></svg>
                </div>
                <p class="text-sm text-[#A1887F] mb-1">ยอดขายช่วงที่เลือก</p>
                <h2 id="total-sales" class="text-3xl font-bold text-[#5D4037]">฿0</h2>
            </div>
            <div class="glass-card p-6 border-b-4 border-[#A1887F]">
                <p class="text-sm text-[#A1887F] mb-1">จำนวนออเดอร์</p>
                <h2 id="total-orders" class="text-3xl font-bold text-[#5D4037]">0</h2>
            </div>
            <div class="glass-card p-6 border-b-4 border-[#D7C1A7]">
                <p class="text-sm text-[#A1887F] mb-1">สินค้าขายดีอันดับ 1</p>
                <h2 id="top-product" class="text-xl font-bold text-[#5D4037] truncate">-</h2>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="glass-card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-medium text-[#5D4037]">กราฟวิเคราะห์ยอดขาย</h3>
                        <span id="chart-subtitle" class="text-xs font-light text-[#A1887F]">แสดงผลแบบรายวัน</span>
                    </div>
                    <div class="h-[350px]"><canvas id="salesChart"></canvas></div>
                </div>
            </div>

            <!-- Best Seller Column -->
            <div class="space-y-8">
                <div class="glass-card p-6 overflow-hidden">
                    <h3 class="text-lg font-medium mb-6 text-[#5D4037]">อันดับสินค้าขายดี</h3>
                    <div class="overflow-y-auto max-h-[500px]">
                        <table class="w-full text-left">
                            <thead class="text-[#A1887F] text-xs uppercase border-b border-[#F5EDE3] sticky top-0 bg-white z-10">
                                <tr>
                                    <th class="pb-4">ชื่อเมนูอาหาร</th>
                                    <th class="pb-4 text-right">จำนวน</th>
                                </tr>
                            </thead>
                            <tbody id="product-list" class="text-sm">
                                <tr><td colspan="2" class="py-10 text-center text-gray-400">รอดึงข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ใช้ URL แบบดึงข้อมูลตรงจาก Google Sheet Export
        const sheetId = '1Z-AAhemLhQkRfhssTciWhJCZyVYg3I2hccl19Co5RGE';
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&id=${sheetId}`;

        let rawData = [];
        let currentView = 'daily';
        let salesChart;

        // ตั้งค่าวันที่เริ่มต้น (30 วันย้อนหลัง)
        const today = new Date();
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(today.getDate() - 30);

        document.getElementById('start-date').value = thirtyDaysAgo.toISOString().split('T')[0];
        document.getElementById('end-date').value = today.toISOString().split('T')[0];

        // ฟังก์ชัน Parse CSV ที่รองรับอักขระพิเศษ
        function robustCSVParser(text) {
            const rows = [];
            let currentCell = '';
            let currentRow = [];
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i+1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentCell += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentCell.trim());
                    currentCell = '';
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (currentCell || currentRow.length > 0) {
                        currentRow.push(currentCell.trim());
                        rows.push(currentRow);
                        currentCell = '';
                        currentRow = [];
                    }
                } else {
                    currentCell += char;
                }
            }
            if (currentRow.length > 0) {
                currentRow.push(currentCell.trim());
                rows.push(currentRow);
            }

            if (rows.length < 2) return [];
            const headers = rows[0];
            return rows.slice(1).map(row => {
                const obj = {};
                headers.forEach((h, i) => {
                    if (h) obj[h] = row[i] || "";
                });
                return obj;
            });
        }

        async function fetchData() {
            updateStatus('loading', 'กำลังโหลด...');
            try {
                // เพิ่ม cache-buster เพื่อป้องกัน Browser จำค่าเก่ากรณีเปิดไฟล์ Local
                const response = await fetch(`${csvUrl}&cb=${Date.now()}`);
                
                if (!response.ok) {
                    throw new Error(`เชื่อมต่อไม่ได้ (Status: ${response.status})`);
                }
                
                const text = await response.text();
                rawData = robustCSVParser(text);
                
                if (rawData.length > 0) {
                    renderDashboard();
                    updateStatus('success', 'เชื่อมต่อสำเร็จ');
                    document.getElementById('data-count').innerText = `${rawData.length} รายการทั้งหมด`;
                } else {
                    updateStatus('error', 'ไม่พบข้อมูลใน Sheet');
                }
            } catch (error) {
                console.error('Fetch error:', error);
                // แจ้งเตือนเรื่อง CORS หากเป็นการเปิดไฟล์ Local
                const errorMsg = window.location.protocol === 'file:' ? 'ข้อผิดพลาด (CORS)' : 'ข้อผิดพลาดระบบ';
                updateStatus('error', errorMsg);
                document.getElementById('data-count').innerText = "โหลดข้อมูลไม่สำเร็จ";
            }
        }

        function changeView(view) {
            currentView = view;
            document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${view}`).classList.add('active');
            document.getElementById('chart-subtitle').innerText = view === 'daily' ? 'แสดงผลแบบรายวัน' : 'แสดงผลแบบรายเดือน';
            renderDashboard();
        }

        function renderDashboard() {
            if (!rawData.length) return;

            const startDate = new Date(document.getElementById('start-date').value);
            const endDate = new Date(document.getElementById('end-date').value);
            endDate.setHours(23, 59, 59);

            const keys = Object.keys(rawData[0]);
            const dateKey = keys.find(k => k.includes('วันที่')) || keys[0];
            const itemKey = keys.find(k => k.includes('รายการสินค้า')) || keys[5];
            const priceKey = keys.find(k => k.includes('ยอดรวม')) || keys[6];

            let filteredCount = 0;
            let totalSum = 0;
            const productCounts = {};
            const chartDataMap = {};

            rawData.forEach(row => {
                const orderDate = new Date(row[dateKey]);
                if (isNaN(orderDate.getTime()) || orderDate < startDate || orderDate > endDate) return;

                filteredCount++;
                const priceStr = String(row[priceKey] || "0").replace(/[^0-9.-]+/g, "");
                const price = parseFloat(priceStr) || 0;
                totalSum += price;

                let dateLabel;
                if (currentView === 'daily') {
                    dateLabel = orderDate.toLocaleDateString('en-CA');
                } else {
                    dateLabel = `${orderDate.getFullYear()}-${String(orderDate.getMonth() + 1).padStart(2, '0')}`;
                }
                chartDataMap[dateLabel] = (chartDataMap[dateLabel] || 0) + price;

                const rawItems = String(row[itemKey] || "");
                const itemParts = rawItems.split(/[\n\r,]+/);
                
                itemParts.forEach(part => {
                    const cleanPart = part.trim();
                    if (!cleanPart || cleanPart.startsWith('{') || cleanPart.startsWith('[')) return;

                    let name = cleanPart.split('(')[0].trim();
                    if (name.includes(':') || name.includes('}') || name.includes('id')) return;

                    let qty = 1;
                    const qtyMatch = cleanPart.match(/\(\s*(\d+)\s*x/);
                    if (qtyMatch) qty = parseInt(qtyMatch[1]);

                    if (name && name.length > 1) {
                        productCounts[name] = (productCounts[name] || 0) + qty;
                    }
                });
            });

            document.getElementById('total-sales').innerText = `฿${totalSum.toLocaleString()}`;
            document.getElementById('total-orders').innerText = filteredCount.toLocaleString();
            
            const sorted = Object.entries(productCounts).sort((a,b) => b[1] - a[1]);
            document.getElementById('top-product').innerText = sorted[0]?.[0] || '-';

            const tbody = document.getElementById('product-list');
            tbody.innerHTML = '';
            if (sorted.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="py-10 text-center text-gray-400">ไม่พบข้อมูลในช่วงที่เลือก</td></tr>';
            } else {
                sorted.forEach(([name, count]) => {
                    tbody.innerHTML += `
                        <tr class="border-b border-[#F5EDE3] hover:bg-[#F5EDE3]/40">
                            <td class="py-3 font-medium text-[#5D4037]">${name}</td>
                            <td class="py-3 text-right font-bold text-[#8D6E63]">${count}</td>
                        </tr>`;
                });
            }

            updateChart(chartDataMap);
        }

        function updateChart(dataMap) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            const sortedKeys = Object.keys(dataMap).sort();
            
            const labels = sortedKeys.map(key => {
                const date = new Date(key);
                if (currentView === 'daily') {
                    return date.toLocaleDateString('th-TH', {day:'numeric', month:'short'});
                } else {
                    return date.toLocaleDateString('th-TH', {month:'short', year:'2-digit'});
                }
            });
            
            const values = sortedKeys.map(key => dataMap[key]);

            if (salesChart) salesChart.destroy();
            
            salesChart = new Chart(ctx, {
                type: currentView === 'daily' ? 'line' : 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        borderColor: '#8D6E63',
                        backgroundColor: currentView === 'daily' ? 'rgba(141, 110, 99, 0.1)' : '#D7C1A7',
                        fill: true,
                        tension: 0.4,
                        borderWidth: currentView === 'daily' ? 3 : 0,
                        borderRadius: 6
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#F5EDE3' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function updateStatus(type, msg) {
            const ind = document.getElementById('status-indicator');
            const txt = document.getElementById('status-text');
            if (!ind || !txt) return;
            
            txt.textContent = msg;
            
            if (type === 'success') {
                ind.className = 'status-dot bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]';
            } else if (type === 'loading') {
                ind.className = 'status-dot bg-yellow-400 animate-pulse';
            } else {
                ind.className = 'status-dot bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]';
            }
        }

        // เริ่มโหลดข้อมูลทันที
        fetchData();
    </script>
</body>
</html>
