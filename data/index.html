<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบวิเคราะห์ข้อมูลร้านกล่องปินโต</title>
    <!-- เพิ่ม Favicon ไอคอนบนแท็บเบราว์เซอร์ -->
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/Klong-Pin-To-37.253-x-20.32-cm.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #FDFBF7; 
            color: #4A3728; 
            min-height: 100vh; 
            scroll-behavior: smooth;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(215, 193, 167, 0.4); 
            border-radius: 24px; 
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .glass-card:hover {
            box-shadow: 0 10px 25px -5px rgba(141, 110, 99, 0.1);
        }
        .btn-tab { 
            padding: 8px 20px; 
            border-radius: 99px; 
            font-size: 0.85rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-tab.active { 
            background-color: #8D6E63; 
            color: white; 
            box-shadow: 0 4px 12px rgba(141, 110, 99, 0.3); 
        }
        .btn-tab:not(.active) { 
            color: #8D6E63; 
            border: 1px solid #8D6E63; 
        }
        .btn-tab:not(.active):hover {
            background-color: rgba(141, 110, 99, 0.05);
        }
        .btn-primary { 
            background-color: #8D6E63; 
            color: #FFF; 
            transition: all 0.3s ease; 
        }
        .btn-primary:hover { 
            background-color: #6D4C41; 
            transform: translateY(-2px); 
            box-shadow: 0 4px 12px rgba(93, 64, 55, 0.2);
        }
        .btn-primary:active { transform: translateY(0); }
        
        input[type="date"] { 
            border: 1px solid #D7C1A7; 
            border-radius: 10px; 
            padding: 6px 12px; 
            font-size: 0.85rem; 
            color: #5D4037; 
            outline: none; 
            background: white;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        
        .system-status-mini {
            position: fixed;
            top: 1rem;
            right: 1.5rem;
            z-index: 100;
            pointer-events: auto;
        }

        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #FDFBF7; }
        ::-webkit-scrollbar-thumb { background: #D7C1A7; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #8D6E63; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12 relative">
    
    <!-- ระบบแจ้งเตือนสถานะ -->
    <div class="system-status-mini flex items-center gap-2 px-3 py-1.5 bg-white/90 rounded-full border border-[#F5EDE3] shadow-md">
        <span id="status-indicator" class="status-dot bg-gray-300"></span>
        <span id="status-text" class="text-[10px] font-bold text-[#A1887F] tracking-wide uppercase">กำลังเตรียมระบบ</span>
    </div>

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-10 gap-6">
            <div>
                <img src="https://img2.pic.in.th/Klong-Pin-To-37.253-x-20.32-cm.png" alt="Logo" class="h-12 md:h-20 w-auto object-contain">
                <h1 class="text-3xl md:text-4xl font-semibold text-[#5D4037] tracking-tight">Dashboard ร้านกล่องปิ่นโต</h1>
                <div class="flex items-center gap-2 mt-2">
                    <div class="w-8 h-[2px] bg-[#8D6E63]"></div>
                    <p class="text-[#8D6E63] text-sm"><span id="data-count">กำลังโหลดข้อมูล...</span></p>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-4 bg-white p-4 rounded-[2rem] shadow-sm border border-[#F5EDE3] w-full xl:w-auto">
                <div class="flex flex-col flex-1 md:flex-none">
                    <label class="text-[10px] text-[#A1887F] uppercase font-black mb-1 ml-1">ตั้งแต่วันที่</label>
                    <input type="date" id="start-date" onchange="renderDashboard()">
                </div>
                <div class="flex flex-col flex-1 md:flex-none">
                    <label class="text-[10px] text-[#A1887F] uppercase font-black mb-1 ml-1">ถึงวันที่</label>
                    <input type="date" id="end-date" onchange="renderDashboard()">
                </div>
                <div class="h-10 w-[1px] bg-[#F5EDE3] mx-2 hidden md:block"></div>
                <div class="flex items-center gap-2 bg-[#FDFBF7] p-1 rounded-full border border-[#F5EDE3]">
                    <button onclick="changeView('daily')" id="tab-daily" class="btn-tab active">รายวัน</button>
                    <button onclick="changeView('monthly')" id="tab-monthly" class="btn-tab">รายเดือน</button>
                </div>
                <button onclick="fetchData()" id="refresh-btn" class="p-3 btn-primary rounded-full shadow-lg" title="ดึงข้อมูลใหม่">
                    <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 16H3v5"></path></svg>
                </button>
            </div>
        </header>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-8 border-t-4 border-[#8D6E63] flex flex-col justify-between">
                <div>
                    <p class="text-xs font-bold text-[#A1887F] uppercase tracking-widest mb-2">ยอดขายช่วงที่เลือก</p>
                    <h2 id="total-sales" class="text-4xl font-bold text-[#5D4037]">฿0</h2>
                </div>
                <div class="mt-4 flex items-center text-[10px] text-green-600 font-bold bg-green-50 w-fit px-2 py-0.5 rounded">
                    <span>ข้อมูลอัปเดต Real-time</span>
                </div>
            </div>
            <div class="glass-card p-8 border-t-4 border-[#A1887F]">
                <p class="text-xs font-bold text-[#A1887F] uppercase tracking-widest mb-2">จำนวนออเดอร์</p>
                <h2 id="total-orders" class="text-4xl font-bold text-[#5D4037]">0</h2>
                <p class="text-[10px] text-[#A1887F] mt-4">รวมทุกสถานะการชำระเงิน</p>
            </div>
            <div class="glass-card p-8 border-t-4 border-[#D7C1A7] bg-gradient-to-br from-white to-[#FDFBF7]">
                <p class="text-xs font-bold text-[#A1887F] uppercase tracking-widest mb-2">สินค้าขายดีอันดับ 1</p>
                <h2 id="top-product" class="text-xl font-bold text-[#5D4037] leading-tight mt-1">-</h2>
                <div id="top-product-qty" class="text-sm text-[#8D6E63] font-medium mt-2"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            <!-- Chart Section -->
            <div class="lg:col-span-2">
                <div class="glass-card p-8 h-full">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h3 class="text-xl font-semibold text-[#5D4037]">แนวโน้มยอดขาย</h3>
                            <p id="chart-subtitle" class="text-xs text-[#A1887F] mt-1 font-medium italic">แสดงผลกราฟเส้นรายวัน</p>
                        </div>
                    </div>
                    <div class="h-[400px] relative">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Best Seller Column -->
            <div class="glass-card p-8 overflow-hidden h-full max-h-[560px] flex flex-col">
                <div class="mb-6">
                    <h3 class="text-xl font-semibold text-[#5D4037]">อันดับสินค้าขายดี</h3>
                    <p class="text-xs text-[#A1887F] mt-1">เรียงตามจำนวนที่ขายได้</p>
                </div>
                <div class="overflow-y-auto pr-2 flex-1">
                    <table class="w-full text-left border-collapse">
                        <thead class="text-[#A1887F] text-[10px] uppercase tracking-tighter border-b border-[#F5EDE3] sticky top-0 bg-white/95 z-10">
                            <tr>
                                <th class="pb-3 font-black">เมนูอาหาร</th>
                                <th class="pb-3 text-right font-black">จำนวน</th>
                            </tr>
                        </thead>
                        <tbody id="product-list" class="text-sm">
                            <tr><td colspan="2" class="py-12 text-center text-gray-400 italic">กำลังเตรียมรายการ...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        

    <script>
        const sheetId = '1Z-AAhemLhQkRfhssTciWhJCZyVYg3I2hccl19Co5RGE';
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&id=${sheetId}`;

        let rawData = [];
        let currentView = 'daily';
        let salesChart;

        // Initialize Dates
        const today = new Date();
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(today.getDate() - 30);

        document.getElementById('start-date').value = thirtyDaysAgo.toISOString().split('T')[0];
        document.getElementById('end-date').value = today.toISOString().split('T')[0];

        // Improved CSV Parser
        function robustCSVParser(text) {
            const rows = [];
            let currentCell = '';
            let currentRow = [];
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i+1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentCell += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentCell.trim());
                    currentCell = '';
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (currentCell || currentRow.length > 0) {
                        currentRow.push(currentCell.trim());
                        rows.push(currentRow);
                        currentCell = '';
                        currentRow = [];
                    }
                } else {
                    currentCell += char;
                }
            }
            if (currentRow.length > 0) {
                currentRow.push(currentCell.trim());
                rows.push(currentRow);
            }

            if (rows.length < 2) return [];
            const headers = rows[0];
            return rows.slice(1).map(row => {
                const obj = {};
                headers.forEach((h, i) => {
                    if (h) obj[h.trim()] = row[i] || "";
                });
                return obj;
            });
        }

        async function fetchData() {
            const btn = document.getElementById('refresh-btn');
            const icon = document.getElementById('refresh-icon');
            
            btn.disabled = true;
            icon.classList.add('animate-spin-slow');
            updateStatus('loading', 'กำลังซิงค์ข้อมูล...');

            try {
                const response = await fetch(`${csvUrl}&cb=${Date.now()}`);
                
                if (!response.ok) throw new Error('Network Error');
                
                const text = await response.text();
                rawData = robustCSVParser(text);
                
                if (rawData.length > 0) {
                    renderDashboard();
                    updateStatus('success', 'เชื่อมต่อสำเร็จ');
                    document.getElementById('data-count').innerText = `พบข้อมูลทั้งหมด ${rawData.length.toLocaleString()} รายการ`;
                } else {
                    throw new Error('No Data');
                }
            } catch (error) {
                console.error(error);
                let msg = 'เชื่อมต่อล้มเหลว';
                if (window.location.protocol === 'file:') msg = 'CORS Blocked (เปิดบนเว็บเท่านั้น)';
                updateStatus('error', msg);
                document.getElementById('data-count').innerText = "โหลดข้อมูลไม่สำเร็จ";
            } finally {
                btn.disabled = false;
                icon.classList.remove('animate-spin-slow');
            }
        }

        function changeView(view) {
            currentView = view;
            document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${view}`).classList.add('active');
            document.getElementById('chart-subtitle').innerText = view === 'daily' ? 'แสดงผลกราฟเส้นรายวัน' : 'แสดงผลกราฟแท่งรายเดือน';
            renderDashboard();
        }

        function renderDashboard() {
            if (!rawData.length) return;

            const startDate = new Date(document.getElementById('start-date').value);
            const endDate = new Date(document.getElementById('end-date').value);
            endDate.setHours(23, 59, 59);

            const headers = Object.keys(rawData[0]);
            const dateKey = headers.find(k => k.includes('วันที่')) || headers[0];
            const itemKey = headers.find(k => k.includes('รายการสินค้า')) || headers[5];
            const priceKey = headers.find(k => k.includes('ยอดรวม')) || headers[6];

            let filteredOrders = 0;
            let totalSum = 0;
            const productCounts = {};
            const chartDataMap = {};

            rawData.forEach(row => {
                const orderDate = new Date(row[dateKey]);
                if (isNaN(orderDate.getTime()) || orderDate < startDate || orderDate > endDate) return;

                filteredOrders++;
                const price = parseFloat(String(row[priceKey] || "0").replace(/[^0-9.-]+/g, "")) || 0;
                totalSum += price;

                // Time Grouping for Chart
                let dateLabel = currentView === 'daily' 
                    ? orderDate.toLocaleDateString('en-CA') 
                    : `${orderDate.getFullYear()}-${String(orderDate.getMonth() + 1).padStart(2, '0')}`;
                
                chartDataMap[dateLabel] = (chartDataMap[dateLabel] || 0) + price;

                // Product Analysis
                const rawItems = String(row[itemKey] || "");
                // แยกด้วยบรรทัดใหม่ หรือ คอมมา
                const items = rawItems.split(/[\n\r,]+/);
                
                items.forEach(item => {
                    let clean = item.trim();
                    if (!clean || clean.startsWith('{') || clean.includes('"id":')) return;

                    // ดึงชื่อสินค้า (มักอยู่หน้าวงเล็บ หรือหน้าจำนวน)
                    let name = clean.split('(')[0].split(' x ')[0].trim();
                    let qty = 1;

                    // ตรวจหาจำนวนในรูปแบบ (2 x ...) หรือ (2)
                    const qtyMatch = clean.match(/\(\s*(\d+)\s*[xX*]/) || clean.match(/\(\s*(\d+)\s*\)/);
                    if (qtyMatch) qty = parseInt(qtyMatch[1]);

                    if (name.length > 1) {
                        productCounts[name] = (productCounts[name] || 0) + qty;
                    }
                });
            });

            // Update KPIs
            document.getElementById('total-sales').innerText = `฿${totalSum.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
            document.getElementById('total-orders').innerText = filteredOrders.toLocaleString();
            
            const sortedProducts = Object.entries(productCounts).sort((a,b) => b[1] - a[1]);
            const topOne = sortedProducts[0];
            document.getElementById('top-product').innerText = topOne ? topOne[0] : '-';
            document.getElementById('top-product-qty').innerText = topOne ? `ขายได้แล้ว ${topOne[1]} กล่อง` : '';

            // Update Product List
            const tbody = document.getElementById('product-list');
            tbody.innerHTML = sortedProducts.length ? '' : '<tr><td colspan="2" class="py-10 text-center text-gray-400 italic">ไม่มีข้อมูลในช่วงนี้</td></tr>';
            
            sortedProducts.forEach(([name, count]) => {
                const row = document.createElement('tr');
                row.className = "border-b border-[#F5EDE3] hover:bg-[#F5EDE3]/30 transition-colors group";
                row.innerHTML = `
                    <td class="py-4 font-medium text-[#5D4037] group-hover:pl-1 transition-all">${name}</td>
                    <td class="py-4 text-right font-bold text-[#8D6E63]">${count.toLocaleString()}</td>
                `;
                tbody.appendChild(row);
            });

            updateChart(chartDataMap);
        }

        function updateChart(dataMap) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            const sortedKeys = Object.keys(dataMap).sort();
            
            const labels = sortedKeys.map(key => {
                const d = new Date(key);
                return currentView === 'daily' 
                    ? d.toLocaleDateString('th-TH', {day:'numeric', month:'short'})
                    : d.toLocaleDateString('th-TH', {month:'long', year:'2-digit'});
            });
            
            const values = sortedKeys.map(key => dataMap[key]);

            if (salesChart) salesChart.destroy();
            
            const isDaily = currentView === 'daily';
            
            salesChart = new Chart(ctx, {
                type: isDaily ? 'line' : 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'ยอดขาย',
                        data: values,
                        borderColor: '#8D6E63',
                        backgroundColor: isDaily ? (context) => {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                            gradient.addColorStop(0, 'rgba(141, 110, 99, 0.3)');
                            gradient.addColorStop(1, 'rgba(141, 110, 99, 0.0)');
                            return gradient;
                        } : '#D7C1A7',
                        fill: true,
                        tension: 0.4,
                        borderWidth: isDaily ? 3 : 0,
                        pointBackgroundColor: '#8D6E63',
                        pointRadius: values.length > 31 ? 0 : 4,
                        borderRadius: 8
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#5D4037',
                            titleFont: { family: 'Kanit' },
                            bodyFont: { family: 'Kanit' },
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: (ctx) => ` ยอดขาย: ฿${ctx.raw.toLocaleString()}`
                            }
                        }
                    },
                    scales: { 
                        y: { 
                            beginAtZero: true, 
                            grid: { color: '#F5EDE3', drawBorder: false },
                            ticks: { font: { family: 'Kanit', size: 10 }, color: '#A1887F' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { font: { family: 'Kanit', size: 10 }, color: '#A1887F' }
                        }
                    }
                }
            });
        }

        function updateStatus(type, msg) {
            const ind = document.getElementById('status-indicator');
            const txt = document.getElementById('status-text');
            if (!ind || !txt) return;
            
            txt.textContent = msg;
            ind.className = 'status-dot ';
            
            switch(type) {
                case 'success':
                    ind.classList.add('bg-green-500', 'shadow-[0_0_10px_rgba(34,197,94,0.6)]');
                    break;
                case 'loading':
                    ind.classList.add('bg-amber-400', 'animate-pulse');
                    break;
                case 'error':
                    ind.classList.add('bg-red-500', 'shadow-[0_0_10px_rgba(239,68,68,0.6)]');
                    break;
            }
        }

        // Run on start
        window.addEventListener('load', fetchData);
    </script>
</body>
</html>
